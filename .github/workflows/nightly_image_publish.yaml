name: Nightly Image Publish

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '4 20 * * *'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Cassandra commit SHA to build'
        required: false
        default: 'HEAD'
        type: string
      branch:
        description: 'Cassandra branch to build'
        required: false
        default: 'trunk'
        type: string

jobs:
  build-oss-trunk:
    outputs:
      # setup outputs so we don't have to checkout Cassandra again and re-parse these
      commitsha: ${{ steps.get_sha_scheduled.outputs.commitsha || steps.get_sha_on_demand.outputs.commitsha }}
      cassandra_branch: ${{ steps.get_sha_scheduled.outputs.cassandra_branch || steps.get_sha_on_demand.outputs.cassandra_branch}}
    strategy:
      fail-fast: false
      matrix:
        cassandra-version: ['6.0', '7.0']
        arch: ['amd64', 'arm64']
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Checkout Cassandra
        id: checkout_cassandra
        uses: actions/checkout@v6
        with:
          repository: 'apache/cassandra'
      - name: Get scheduled Cassandra COMMIT SHA
        if: ${{ github.event_name == 'schedule' }}
        id: get_sha_scheduled
        run: |
          COMMITSHA=$(git rev-parse --short HEAD)
          echo "COMMITSHA=$COMMITSHA" >> $GITHUB_ENV
          echo "commitsha=$COMMITSHA" >> $GITHUB_OUTPUT
          echo "CASSANDRA_BRANCH=trunk" >> $GITHUB_ENV
      - name: Get on-demand Cassandra COMMIT SHA
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: get_sha_on_demand
        run: |
          COMMITSHA=$(git rev-parse --short ${{ inputs.sha }})
          echo "COMMITSHA=$COMMITSHA" >> $GITHUB_ENV
          echo "commitsha=$COMMITSHA" >> $GITHUB_OUTPUT
          echo "CASSANDRA_BRANCH=${{ inputs.branch }}" >> $GITHUB_ENV
          echo "cassandra_branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT

      - name: Setup Docker scheduled meta
        if: ${{ github.event_name == 'schedule' }}
        id: meta_schedule
        uses: docker/metadata-action@v6
        with:
          images: k8ssandra/cass-management-api
          flavor: |
            prefix=${{ matrix.cassandra-version }}-nightly-${{ matrix.arch }}-
          tags: |
            type=raw,value=${{ env.COMMITSHA }}
      - name: Setup Docker on demand meta
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: meta_on_demand
        uses: docker/metadata-action@v6
        with:
          images: k8ssandra/cass-management-api
          flavor: |
            prefix=${{ matrix.cassandra-version }}-${{ matrix.arch }}-
          tags: |
            type=raw,value=${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
      - name: Checkout Management API
        uses: actions/checkout@v6
      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build scheduled ${{ matrix.cassandra-version }}-${{ matrix.arch }} image
        if: ${{ github.event_name == 'schedule' && matrix.cassandra-version == '7.0'}}
        uses: docker/build-push-action@v7
        with:
          file: cassandra-trunk/Dockerfile-trunk.ubi
          context: .
          push: false
          tags: ${{ steps.meta_schedule.outputs.tags }}
          platforms: linux/${{ matrix.arch }}
          target: cassandra
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.nightly.${{ matrix.arch }}.tar
      - name: Build scheduled ${{ matrix.cassandra-version }}-${{ matrix.arch }} image
        if: ${{ github.event_name == 'schedule' && matrix.cassandra-version == '6.0'}}
        uses: docker/build-push-action@v7
        with:
          file: cassandra-trunk/Dockerfile-6.0.ubi
          context: .
          push: false
          tags: ${{ steps.meta_schedule.outputs.tags }}
          platforms: linux/${{ matrix.arch }}
          target: cassandra
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.nightly.${{ matrix.arch }}.tar
      - name: Build on-demand ${{ matrix.cassandra-version }}-${{ matrix.arch }} image
        if: ${{ github.event_name == 'workflow_dispatch' && matrix.cassandra-version == '7.0'}}
        uses: docker/build-push-action@v7
        with:
          file: cassandra-trunk/Dockerfile-trunk.ubi
          context: .
          push: false
          tags: ${{ steps.meta_on_demand.outputs.tags }}
          platforms: linux/${{ matrix.arch }}
          target: cassandra
          build-args: COMMITSHA=${{ env.COMMITSHA }}, CASSANDRA_BRANCH=${{ env.CASSANDRA_BRANCH }}
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.on-demand.${{ matrix.arch }}.tar
      - name: Build on-demand ${{ matrix.cassandra-version }}-${{ matrix.arch }} image
        if: ${{ github.event_name == 'workflow_dispatch' && matrix.cassandra-version == '6.0'}}
        uses: docker/build-push-action@v7
        with:
          file: cassandra-trunk/Dockerfile-6.0.ubi
          context: .
          push: false
          tags: ${{ steps.meta_on_demand.outputs.tags }}
          platforms: linux/${{ matrix.arch }}
          target: cassandra
          build-args: COMMITSHA=${{ env.COMMITSHA }}, CASSANDRA_BRANCH=${{ env.CASSANDRA_BRANCH }}
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.on-demand.${{ matrix.arch }}.tar
      - name: Upload scheduled Docker Image for ${{ matrix.cassandra-version }}-${{ matrix.arch }}
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.nightly.${{ matrix.arch }}
          path: /tmp/cassandra.${{ matrix.cassandra-version }}.nightly.${{ matrix.arch }}.tar
          retention-days: 3
      - name: Upload on-demand Docker Image for ${{ matrix.cassandra-version }}-${{ matrix.arch }}
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.on-demand.${{ matrix.arch }}
          path: /tmp/cassandra.${{ matrix.cassandra-version }}.on-demand.${{ matrix.arch }}.tar
          retention-days: 3

  create-manifests:
    name: Create multi-arch manifests
    needs: build-oss-trunk
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cassandra-version: ['6.0', '7.0']
    steps:
      - name: Set Cassandra version info from build job
        run: |
          echo "COMMITSHA=${{ needs.build-oss-trunk.outputs.commitsha }}" >> $GITHUB_ENV
          echo "CASSANDRA_BRANCH=${{ needs.build-oss-trunk.outputs.cassandra_branch }}" >> $GITHUB_ENV
      - name: Download scheduled AMD64 image
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/download-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.nightly.amd64
          path: /tmp
      - name: Download scheduled ARM64 image
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/download-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.nightly.arm64
          path: /tmp
      - name: Download on-demand AMD64 image
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.on-demand.amd64
          path: /tmp
      - name: Download on-demand ARM64 image
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.on-demand.arm64
          path: /tmp
      - name: Load scheduled Docker images
        if: ${{ github.event_name == 'schedule' }}
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.nightly.amd64.tar
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.nightly.arm64.tar
      - name: Load on-demand Docker images
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.on-demand.amd64.tar
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.on-demand.arm64.tar
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push scheduled images to registries
        if: ${{ github.event_name == 'schedule' }}
        run: |
          # Push to DockerHub (images already have correct tags)
          docker push k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-amd64-${{ env.COMMITSHA }}
          docker push k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-arm64-${{ env.COMMITSHA }}

          # Tag and push to GHCR
          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-amd64-${{ env.COMMITSHA }} \
            ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-amd64-${{ env.COMMITSHA }}
          docker push ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-amd64-${{ env.COMMITSHA }}

          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-arm64-${{ env.COMMITSHA }} \
            ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-arm64-${{ env.COMMITSHA }}
          docker push ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-arm64-${{ env.COMMITSHA }}
      - name: Push on-demand images to registries
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Push to DockerHub (images already have correct tags)
          docker push k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-amd64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
          docker push k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-arm64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}

          # Tag and push to GHCR
          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-amd64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }} \
            ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-amd64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
          docker push ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-amd64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}

          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-arm64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }} \
            ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-arm64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
          docker push ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-arm64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
      - name: Setup Docker scheduled meta
        if: ${{ github.event_name == 'schedule' }}
        id: meta_schedule
        uses: docker/metadata-action@v6
        with:
          images: |
            k8ssandra/cass-management-api
            ghcr.io/k8ssandra/cass-management-api
          flavor: |
            prefix=${{ matrix.cassandra-version }}-nightly-
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ env.COMMITSHA }}
      - name: Setup Docker on demand meta
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: meta_on_demand
        uses: docker/metadata-action@v6
        with:
          images: |
            k8ssandra/cass-management-api
            ghcr.io/k8ssandra/cass-management-api
          flavor: |
            prefix=${{ matrix.cassandra-version }}-
          tags: |
            type=raw,value=${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
      - name: Create and push scheduled multi-arch manifests
        if: ${{ github.event_name == 'schedule' }}
        run: |
          # Parse tags from metadata-action output (newline-separated)
          TAGS="${{ steps.meta_schedule.outputs.tags }}"
          # Create and push manifest for each tag
          echo "$TAGS" | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              # Determine registry and reference appropriate platform images
              if [[ "$tag" == ghcr.io/* ]]; then
                docker manifest create $tag \
                  --amend ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-amd64-${{ env.COMMITSHA }} \
                  --amend ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-arm64-${{ env.COMMITSHA }}
              else
                docker manifest create $tag \
                  --amend k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-amd64-${{ env.COMMITSHA }} \
                  --amend k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-nightly-arm64-${{ env.COMMITSHA }}
              fi
              docker manifest push $tag
            fi
          done
      - name: Create and push on-demand multi-arch manifest
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Parse tags from metadata-action output (newline-separated)
          TAGS="${{ steps.meta_on_demand.outputs.tags }}"
          # Create and push manifest for each tag
          echo "$TAGS" | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              # Determine registry and reference appropriate platform images
              if [[ "$tag" == ghcr.io/* ]]; then
                docker manifest create $tag \
                  --amend ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-amd64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }} \
                  --amend ghcr.io/k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-arm64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
              else
                docker manifest create $tag \
                  --amend k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-amd64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }} \
                  --amend k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-arm64-${{ env.CASSANDRA_BRANCH }}-${{ env.COMMITSHA }}
              fi
              docker manifest push $tag
            fi
          done
