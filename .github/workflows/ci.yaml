name: Java CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'
  pull_request:
    types: [opened, reopened]

jobs:
  run-unit-tests:
    name: Run Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-hcd-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Setup Maven settings file
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>artifactory-snapshots</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
              <server>
                <id>artifactory-releases</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
              <server>
                <id>artifactory</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF
      - name: Build with Maven and run unit tests (k8ssandra repo)
        if: github.repository_owner == 'k8ssandra'
        run: mvn -B -q package --file pom.xml -P dse,hcd
      - name: Build with Maven and run unit tests (3rd party repo)
        if: github.repository_owner != 'k8ssandra'
        run: mvn -B -q package --file pom.xml
      - name: Save Maven cache
        uses: actions/cache/save@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
      - name: Save Maven build artifacts
        uses: actions/cache/save@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra
          key: ${{ runner.os }}-workspace-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
      - name: Save Cassandra Download for tests
        uses: actions/cache/save@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
        

  build-oss-docker-images:
    name: Build Cassandra images
    runs-on: ubuntu-latest
    needs: run-unit-tests
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        cassandra-version: ['4.0', '4.1', '5.0']
        base-platform: ['ubuntu', 'ubi']
        exclude:
          - cassandra-version: '5.0'
            base-platform: 'ubuntu'
    steps:
      - name: Restore build workspace
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra
          key: ${{ runner.os }}-workspace-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      # Setup metadata based on the commit/tag that will be used for tagging the image
      # Only build and publish a commit based tag
      - name: Setup Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: k8ssandra/cass-management-api
          tags: type=sha,format=long,prefix=${{ matrix.cassandra-version }}-${{ matrix.base-platform }}-
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Cassandra ${{ matrix.cassandra-version }}-${{ matrix.base-platform }}
        if: ${{ matrix.base-platform == 'ubuntu' }}
        id: docker_build_ubuntu
        uses: docker/build-push-action@v7
        with:
          file: cassandra/Dockerfile-${{ matrix.cassandra-version }}
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          target: cassandra
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}.tar
      - name: Build Cassandra ${{ matrix.cassandra-version }}-${{ matrix.base-platform }}
        if: ${{ matrix.base-platform != 'ubuntu' }}
        id: docker_build_ubi
        uses: docker/build-push-action@v7
        with:
          file: cassandra/Dockerfile-${{ matrix.cassandra-version }}.${{ matrix.base-platform }}
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          target: cassandra
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}.tar
      - name: Upload Docker Image for Cassandra ${{ matrix.cassandra-version }}-${{ matrix.base-platform }}
        uses: actions/upload-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}
          path: /tmp/cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}.tar
          retention-days: 3

  build-trunk-docker-images:
    name: Build Cassandra trunk image
    runs-on: ubuntu-latest
    needs: run-unit-tests
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        cassandra-version: ['6.0', 'trunk']
    steps:
      - name: Restore build workspace
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra
          key: ${{ runner.os }}-workspace-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      # Setup metadata based on the commit/tag that will be used for tagging the image
      # Only build and publish a commit based tag
      - name: Setup Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: k8ssandra/cass-management-api
          tags: type=sha,format=long,prefix=${{ matrix.cassandra-version }}-ubi-
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Cassandra ${{ matrix.cassandra-version }} UBI
        id: docker_build_trunk
        uses: docker/build-push-action@v7
        with:
          file: cassandra-trunk/Dockerfile-${{ matrix.cassandra-version }}.ubi
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          target: cassandra
          outputs: type=docker,dest=/tmp/cassandra.${{ matrix.cassandra-version }}.ubi.tar
      - name: Upload Docker Image for Cassandra ${{ matrix.cassandra-version }} UBI
        uses: actions/upload-artifact@v7
        with:
          name: cassandra.${{ matrix.cassandra-version }}.ubi
          path: /tmp/cassandra.${{ matrix.cassandra-version }}.ubi.tar
          retention-days: 3
          
  build-and-test-dse:
    name: Build and Test DSE ${{ matrix.itTest }} [${{ matrix.dse-version }}, ${{ matrix.base-platform }}]
    runs-on: ubuntu-latest
    needs: run-unit-tests
    # need a local docker registry to push images into for UBI builds
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        dse-version: ['6.8', '6.9']
        base-platform: ['jdk8', 'jdk11', 'ubi']
        itTest : ['LifecycleIT', 'KeepAliveIT', 'NonDestructiveOpsIT', 'DestructiveOpsIT', 'DSESpecificIT', 'NonDestructiveOpsResourcesV2IT', 'DockerImageIT', 'AsyncRepairIT', 'PortOverrideIT', 'MetricsIT']
        exclude:
          - dse-version: '6.9'
            base-platform: 'jdk8'
          - dse-version: '6.8'
            base-platform: 'jdk11'
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Setup Maven settings file
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>artifactory-snapshots</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
              <server>
                <id>artifactory-releases</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
              <server>
                <id>artifactory</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF
      - name: Build Maven artifacts
        run: mvn -B -q package -DskipTests -Dskip.surefire.tests -DskipOpenApi -P dse
      - name: Restore Cassandra Download for tests
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: ${{ matrix.base-platform == 'ubi' && 'network=host' || '' }}
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      # Build Ubuntu-based images (jdk8, jdk11)
      - name: Build DSE ${{ matrix.dse-version }}-${{ matrix.base-platform }}
        if: ${{ matrix.base-platform != 'ubi' }}
        uses: docker/build-push-action@v7
        with:
          file: dse/Dockerfile-dse${{ matrix.dse-version }}.${{ matrix.base-platform }}
          context: .
          push: false
          load: true
          tags: mgmtapi-dockerfile-dse${{ matrix.dse-version }}.${{ matrix.base-platform }}-test:latest
          platforms: linux/amd64
          target: dse
      
      # Build UBI images (requires base Ubuntu image first)
      - name: Build DSE ${{ matrix.dse-version }} base for UBI
        if: ${{ matrix.base-platform == 'ubi' }}
        uses: docker/build-push-action@v7
        with:
          file: dse/Dockerfile-dse${{ matrix.dse-version }}.${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}
          context: .
          push: false
          tags: localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
          platforms: linux/amd64
          target: dse
          outputs: type=docker
      
      - name: Push base image to local registry for UBI build
        if: ${{ matrix.base-platform == 'ubi' }}
        run: |
          docker push localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
      
      - name: Build DSE ${{ matrix.dse-version }}-${{ matrix.base-platform }}
        if: ${{ matrix.base-platform == 'ubi' }}
        uses: docker/build-push-action@v7
        with:
          file: dse/Dockerfile-dse${{ matrix.dse-version }}.${{ matrix.base-platform }}
          context: .
          build-contexts: |
            builder=docker-image://localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
          push: false
          load: true
          tags: mgmtapi-dockerfile-dse${{ matrix.dse-version }}.${{ matrix.base-platform }}-test:latest
          platforms: linux/amd64
          target: dse
          build-args: DSE_BASE_IMAGE=localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
      
      # Run tests
      - name: Setup Maven settings.xml
        run: |
          cp ~/.m2/settings.xml settings.xml
      - name: Build with Maven and run tests
        if: ${{ matrix.base-platform != 'ubi' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml -P dse -Dit.test=${{ matrix.itTest }} -DfailIfNoTests=false \
          -DrunDSE${{ matrix.dse-version }}tests
      - name: Build with Maven and run tests
        if: ${{ matrix.base-platform == 'ubi' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml -P dse -Dit.test=${{ matrix.itTest }} -DfailIfNoTests=false \
          -DrunDSE${{ matrix.dse-version }}testsUBI

  test-oss:
    name: Run Cassandra ${{ matrix.itTest }} [${{ matrix.cassandra-version }}, ${{ matrix.base-platform }}]
    needs: build-oss-docker-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        cassandra-version: ['4.0', '4.1', '5.0']
        base-platform: ['ubuntu', 'ubi']
        itTest : ['LifecycleIT', 'KeepAliveIT', 'NonDestructiveOpsIT', 'DestructiveOpsIT', 'NonDestructiveOpsResourcesV2IT', 'DockerImageIT', 'AsyncRepairIT', 'PortOverrideIT', 'MetricsIT']
        exclude:
          - cassandra-version: '5.0'
            base-platform: 'ubuntu'
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Restore Cassandra Download for tests
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}
          path: /tmp
      - name: Load Docker ${{ matrix.cassandra-version }}-${{ matrix.base-platform }} image
        if: ${{ matrix.base-platform == 'ubuntu' }}
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}.tar
          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-${{ matrix.base-platform }}-${{ github.sha }} mgmtapi-dockerfile-${{ matrix.cassandra-version }}-test:latest
          docker image ls -a
      - name: Load Docker ${{ matrix.cassandra-version }}-${{ matrix.base-platform }} image
        if: ${{ matrix.base-platform != 'ubuntu' }}
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}.tar
          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-${{ matrix.base-platform }}-${{ github.sha }} mgmtapi-dockerfile-${{ matrix.cassandra-version }}.${{ matrix.base-platform }}-test:latest
          docker image ls -a
      - name: Build with Maven and run tests
        if: ${{ matrix.base-platform == 'ubuntu' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}tests \
          -Dit.test=${{ matrix.itTest }} -DfailIfNoTests=false
      - name: Build with Maven and run tests
        if: ${{ matrix.base-platform != 'ubuntu' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}testsUBI \
          -Dit.test=${{ matrix.itTest }} -DfailIfNoTests=false

  test-oss-41:
    # This job is inetnded to run the various versiosn of Cassandra 4.1 where internal changes to OSS code
    # require Java refelction tricks in the Agent code.
    name: Run Cassandra 4.1 Specific Tests [${{ matrix.cassandra-version }}.${{ matrix.minor-version }}, ${{ matrix.base-platform }}]
    needs: build-oss-docker-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        cassandra-version: ['4.1']
        base-platform: ['ubuntu', 'ubi']
        minor-version : ['2', '5']
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Restore Cassandra Download for tests
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
      - name: Build artifacts
        run: mvn -B -q package -DskipTests -Dskip.surefire.tests -DskipOpenApi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Build Docker test image Ubuntu
        if: ${{ matrix.base-platform == 'ubuntu' }}
        run: |
          docker buildx build --load \
            --build-arg CASSANDRA_VERSION=${{ matrix.cassandra-version }}.${{ matrix.minor-version }} \
            --tag mgmtapi-dockerfile-${{ matrix.cassandra-version }}-test:latest \
            --file cassandra/Dockerfile-${{ matrix.cassandra-version }} \
            --target cassandra .
      - name: Build Docker test image UBI
        if: ${{ matrix.base-platform != 'ubuntu' }}
        run: |
          docker buildx build --load \
            --build-arg CASSANDRA_VERSION=${{ matrix.cassandra-version }}.${{ matrix.minor-version }} \
            --tag mgmtapi-dockerfile-${{ matrix.cassandra-version }}.${{ matrix.base-platform }}-test:latest \
            --file cassandra/Dockerfile-${{ matrix.cassandra-version }}.ubi \
            --target cassandra .
      - name: Build with Maven and run tests Ubuntu
        if: ${{ matrix.base-platform == 'ubuntu' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}tests \
          -Dit.test=Lifecycle41${{ matrix.minor-version }}IT -DfailIfNoTests=false
      - name: Build with Maven and run tests UBI
        if: ${{ matrix.base-platform != 'ubuntu' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}testsUBI \
          -Dit.test=Lifecycle41${{ matrix.minor-version }}IT -DfailIfNoTests=false

  test-oss-nodetool:
    # This job is inetnded to run a version of Cassandra (4.0.1) that requires a JDK fix for nodetool JDK-8278972
    # require Java refelction tricks in the Agent code.
    name: Run Cassandra Nodetool test
    needs: run-unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        cassandra-version: ['4.0']
        base-platform: ['ubuntu', 'ubi']
        minor-version : ['1']
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Restore Cassandra Download for tests
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
      - name: Build artifacts
        run: mvn -B -q package -DskipTests -Dskip.surefire.tests -DskipOpenApi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Build Docker test image Ubuntu
        if: ${{ matrix.base-platform == 'ubuntu' }}
        run: |
          docker buildx build --load \
            --build-arg CASSANDRA_VERSION=${{ matrix.cassandra-version }}.${{ matrix.minor-version }} \
            --tag mgmtapi-dockerfile-${{ matrix.cassandra-version }}-test:latest \
            --file cassandra/Dockerfile-${{ matrix.cassandra-version }} \
            --target cassandra .
      - name: Build Docker test image UBI
        if: ${{ matrix.base-platform != 'ubuntu' }}
        run: |
          docker buildx build --load \
            --build-arg CASSANDRA_VERSION=${{ matrix.cassandra-version }}.${{ matrix.minor-version }} \
            --tag mgmtapi-dockerfile-${{ matrix.cassandra-version }}.${{ matrix.base-platform }}-test:latest \
            --file cassandra/Dockerfile-${{ matrix.cassandra-version }}.ubi \
            --target cassandra .
      - name: Build with Maven and run tests Ubuntu
        if: ${{ matrix.base-platform == 'ubuntu' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}tests \
          -Dit.test=NodetoolIT -DfailIfNoTests=false
      - name: Build with Maven and run tests UBI
        if: ${{ matrix.base-platform != 'ubuntu' }}
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}testsUBI \
          -Dit.test=NodetoolIT -DfailIfNoTests=false

  test-oss-50:
    # This job is inetnded to run the various versiosn of Cassandra 5.0 where Netty version conflicts
    # with the Metrics endpoint hve caused issues (see https://github.com/k8ssandra/management-api-for-apache-cassandra/issues/755)
    name: Run Cassandra 5.0 Specific Tests [${{ matrix.cassandra-version }}.${{ matrix.minor-version }}]
    needs: build-oss-docker-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        cassandra-version: ['5.0']
        minor-version : ['2']
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Restore Cassandra Download for tests
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
      - name: Build artifacts
        run: mvn -B -q package -DskipTests -Dskip.surefire.tests -DskipOpenApi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Build Docker test image UBI
        run: |
          docker buildx build --load \
            --build-arg CASSANDRA_VERSION=${{ matrix.cassandra-version }}.${{ matrix.minor-version }} \
            --tag mgmtapi-dockerfile-${{ matrix.cassandra-version }}.ubi-test:latest \
            --file cassandra/Dockerfile-${{ matrix.cassandra-version }}.ubi \
            --target cassandra .
      - name: Build with Maven and run tests UBI
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}testsUBI \
          -Dit.test=Metrics50${{ matrix.minor-version }}IT -DfailIfNoTests=false

  test-oss-trunk:
    name: Run Cassandra ${{ matrix.itTest }} [${{ matrix.cassandra-version }}, ubi]
    needs: build-trunk-docker-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        cassandra-version: ['6.0', 'trunk']
        itTest : ['LifecycleIT', 'KeepAliveIT', 'NonDestructiveOpsIT', 'DestructiveOpsIT', 'NonDestructiveOpsResourcesV2IT', 'DockerImageIT', 'AsyncRepairIT', 'PortOverrideIT', 'MetricsIT']
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Restore Cassandra Download for tests
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/work/management-api-for-apache-cassandra/management-api-for-apache-cassandra/management-api-server/.cassandra-bin
          key: cassandra-download-${{ github.sha }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: cassandra.${{ matrix.cassandra-version }}.ubi
          path: /tmp
      - name: Load Docker ${{ matrix.cassandra-version }}-ubi image
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.ubi.tar
          docker tag k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-ubi-${{ github.sha }} mgmtapi-dockerfile-${{ matrix.cassandra-version }}.ubi-test:latest
          docker image ls -a
      - name: Build with Maven and run tests
        run: |
          mvn -B -q verify -Dskip.surefire.tests --file pom.xml \
          -Drun${{ matrix.cassandra-version }}testsUBI \
          -Dit.test=${{ matrix.itTest }} -DfailIfNoTests=false


  publish-oss:
    name: Publish ${{ matrix.cassandra-version }} Cassandra image
    if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push'}}
    needs: test-oss
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        cassandra-version: ['4.0', '4.1', '5.0']
        base-platform: ['ubuntu', 'ubi']
        exclude:
          - cassandra-version: '5.0'
            base-platform: 'ubuntu'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}
          path: /tmp
      - name: Load Docker ${{ matrix.cassandra-version }}-${{ matrix.base-platform }} image
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.${{ matrix.base-platform }}.tar
          docker image ls -a
          docker push k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-${{ matrix.base-platform }}-${{ github.sha }}

  publish-trunk:
    name: Publish Cassandra Trunk image
    if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push'}}
    needs: test-oss-trunk
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        cassandra-version: ['6.0', 'trunk']
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: cassandra.${{ matrix.cassandra-version }}.ubi
          path: /tmp
      - name: Load Docker ${{ matrix.cassandra-version }}-ubi image
        run: |
          docker load --input /tmp/cassandra.${{ matrix.cassandra-version }}.ubi.tar
          docker image ls -a
          docker push k8ssandra/cass-management-api:${{ matrix.cassandra-version }}-ubi-${{ github.sha }}

  publish-dse:
    name: Publish DSE 6.x image to ICR
    if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push'}}
    needs: build-and-test-dse
    runs-on: ubuntu-latest
    # need a local docker registry to push images into for UBI builds
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    strategy:
      matrix:
        dse-version: ['6.8', '6.9']
        base-platform: ['jdk8', 'jdk11', 'ubi']
        exclude:
          - dse-version: '6.9'
            base-platform: 'jdk8'
          - dse-version: '6.8'
            base-platform: 'jdk11'
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ github.sha }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Setup Maven settings file
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>artifactory-snapshots</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
              <server>
                <id>artifactory-releases</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
              <server>
                <id>artifactory</id>
                <username>${{ secrets.ARTIFACTORY_USERNAME }}</username>
                <password>${{ secrets.ARTIFACTORY_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF
      - name: Build Maven artifacts
        run: mvn -B -q package -DskipTests -Dskip.surefire.tests -DskipOpenApi -P dse
      - name: Setup Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: icr.io/ds-mission-control-private/dse-mgmtapi-6_8
          tags: type=sha,format=long,prefix=${{ matrix.dse-version }}-${{ matrix.base-platform }}-
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: ${{ matrix.base-platform == 'ubi' && 'network=host' || '' }}
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - id: docker-login-icr
        uses: docker/login-action@v3
        with:
          username: iamapikey
          password: ${{ secrets.PRIVATE_ICR_API_KEY }}
          registry: icr.io
      
      # Rebuild images for publishing (same as in build-and-test-dse)
      # Build Ubuntu-based images (jdk8, jdk11)
      - name: Build DSE ${{ matrix.dse-version }}-${{ matrix.base-platform }}
        if: ${{ matrix.base-platform != 'ubi' }}
        uses: docker/build-push-action@v7
        with:
          file: dse/Dockerfile-dse${{ matrix.dse-version }}.${{ matrix.base-platform }}
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          target: dse
      
      # Build UBI images (requires base Ubuntu image first)
      - name: Build DSE ${{ matrix.dse-version }} base for UBI
        if: ${{ matrix.base-platform == 'ubi' }}
        uses: docker/build-push-action@v7
        with:
          file: dse/Dockerfile-dse${{ matrix.dse-version }}.${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}
          context: .
          push: false
          tags: localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
          platforms: linux/amd64
          target: dse
          outputs: type=docker
      
      - name: Push base image to local registry for UBI build
        if: ${{ matrix.base-platform == 'ubi' }}
        run: |
          docker push localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
      
      - name: Build and push DSE ${{ matrix.dse-version }}-${{ matrix.base-platform }}
        if: ${{ matrix.base-platform == 'ubi' }}
        uses: docker/build-push-action@v7
        with:
          file: dse/Dockerfile-dse${{ matrix.dse-version }}.${{ matrix.base-platform }}
          context: .
          build-contexts: |
            builder=docker-image://localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          target: dse
          build-args: DSE_BASE_IMAGE=localhost:5000/dse-mgmtapi-6_8-${{ matrix.dse-version }}-${{ matrix.dse-version == '6.8' && 'jdk8' || 'jdk11' }}-${{ github.sha }}
